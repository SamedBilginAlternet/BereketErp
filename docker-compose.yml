services:
  mysql:
    image: mysql:8.0
    container_name: bereket-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-bereket_erp}
      MYSQL_USER: ${DB_USERNAME:-bereket}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bereket_dev}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_turkish_ci
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: docker/php
    container_name: bereket-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy

  scheduler:
    build:
      context: docker/php
    container_name: bereket-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    volumes:
      - ./backend:/var/www/html
    environment:
      DB_HOST: mysql
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: bereket-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  node:
    image: node:22-alpine
    container_name: bereket-node
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "${VITE_PORT:-5173}:5173"
    environment:
      VITE_API_URL: http://nginx

volumes:
  mysql-data:
